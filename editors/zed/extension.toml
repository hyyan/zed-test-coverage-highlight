id = "test-coverage-highlight"
name = "Test Coverage Highlight"
version = "0.1.0"
schema_version = 1
authors = ["Hyyan Abo Fakher <hyyanaf@gmail.com>"]
description = "Highlight test coverage (lcov, jacoco, cobertura, clover) as colored lines, via LSP document colors."
repository = "https://github.com/hyyanaf/test-coverage-highlight"

# Ships only a language server. It attaches alongside each language's real LSP
# (rust-analyzer, jdtls, ...) and answers textDocument/documentColor with a color
# per covered / uncovered / partial line, plus a coverage-% hover. Zed renders
# the colors according to the `lsp_document_colors` setting ("background").
[language_servers.covhl]
name = "Test Coverage Highlight"
languages = [
  "Java",
  "Kotlin",
  "Scala",
  "Groovy",
  "Rust",
  "JavaScript",
  "TypeScript",
  "TSX",
  "Python",
  "Go",
  "C",
  "C++",
  "C#",
  "Ruby",
  "PHP",
  "Dart",
]
